<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1分間スピーチ練習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .recording-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl p-8 border border-slate-100">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">1分間スピーチ練習</h1>
            <p class="text-slate-500 text-sm mt-1">タイマーに合わせて録音と文字起こしを行います</p>
        </header>

        <!-- Timer Circle -->
        <div class="relative flex items-center justify-center mb-8">
            <svg class="w-48 h-48">
                <circle class="text-slate-200" stroke-width="8" stroke="currentColor" fill="transparent" r="85" cx="96" cy="96"/>
                <circle id="progress-bar" class="text-blue-600 progress-ring" stroke-width="8" stroke-dasharray="534" stroke-dashoffset="0" stroke-linecap="round" stroke="currentColor" fill="transparent" r="85" cx="96" cy="96"/>
            </svg>
            <div class="absolute text-center">
                <span id="timer-text" class="text-5xl font-mono font-bold text-slate-700">60</span>
                <p class="text-xs uppercase text-slate-400 font-bold tracking-widest">Seconds</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col gap-4 mb-8">
            <div class="flex justify-center gap-4">
                <button id="start-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-2xl transition shadow-lg active:scale-95 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                    スタート
                </button>
                <button id="stop-btn" disabled class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-6 rounded-2xl transition shadow-lg active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>
                    停止
                </button>
            </div>
        </div>

        <!-- Recording & Transcription Section -->
        <div id="result-area" class="space-y-6">
            <!-- Audio Player -->
            <div id="audio-container" class="hidden">
                <h3 class="text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                    録音された音声
                </h3>
                <audio id="audio-playback" controls class="w-full"></audio>
            </div>

            <!-- Transcription -->
            <div>
                <h3 class="text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    文字起こし
                </h3>
                <div id="transcription-box" class="w-full min-h-[120px] p-4 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 text-sm overflow-y-auto max-h-48 whitespace-pre-wrap leading-relaxed">
                    ここに文字起こしが表示されます...
                </div>
            </div>
        </div>

        <footer class="mt-8 text-center text-xs text-slate-400">
            ※文字起こし機能は Google Chrome などの対応ブラウザが必要です。
        </footer>
    </div>

    <script>
        // Variables
        let mediaRecorder;
        let audioChunks = [];
        let timer;
        let timeLeft = 60;
        let recognition;
        const totalSeconds = 60;

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const timerText = document.getElementById('timer-text');
        const progressBar = document.getElementById('progress-bar');
        const transcriptionBox = document.getElementById('transcription-box');
        const audioPlayback = document.getElementById('audio-playback');
        const audioContainer = document.getElementById('audio-container');

        const circumference = 2 * Math.PI * 85;

        // Initialize Speech Recognition
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (window.SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;
            recognition.continuous = true;

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = 0; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                transcriptionBox.textContent = transcript;
            };
        }

        // Timer Update function
        function updateTimer() {
            timeLeft--;
            timerText.textContent = timeLeft;
            
            // Update Progress Circle
            const offset = circumference - (timeLeft / totalSeconds) * circumference;
            progressBar.style.strokeDashoffset = offset;

            if (timeLeft <= 0) {
                stopSpeech();
            }
        }

        // Start Recording and Timer
        async function startSpeech() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayback.src = audioUrl;
                    audioContainer.classList.remove('hidden');
                };

                // UI Reset
                timeLeft = totalSeconds;
                timerText.textContent = timeLeft;
                progressBar.style.strokeDashoffset = 0;
                transcriptionBox.textContent = "録音中...";
                audioContainer.classList.add('hidden');

                // Start actions
                mediaRecorder.start();
                if (recognition) recognition.start();
                
                timer = setInterval(updateTimer, 1000);
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                startBtn.classList.add('opacity-50');
                progressBar.classList.add('recording-pulse');

            } catch (err) {
                alert("マイクの使用を許可してください。");
                console.error(err);
            }
        }

        // Stop Recording and Timer
        function stopSpeech() {
            clearInterval(timer);
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            if (recognition) {
                recognition.stop();
            }
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            startBtn.classList.remove('opacity-50');
            progressBar.classList.remove('recording-pulse');
        }

        // Event Listeners
        startBtn.addEventListener('click', startSpeech);
        stopBtn.addEventListener('click', stopSpeech);

    </script>
</body>
</html>
