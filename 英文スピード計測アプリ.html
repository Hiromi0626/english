<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPM計測アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        #text-display { line-height: 1.8; font-size: 1.1rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-6 md:p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">WPM計測アプリ</h1>

        <!-- Step 1: Input Section -->
        <div id="setup-section">
            <label class="block text-sm font-medium text-gray-700 mb-2">英文を貼り付けてください：</label>
            <textarea id="text-input" rows="8" class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="ここに英語の文章を入力..."></textarea>
            <div class="mt-4 flex justify-between items-center">
                <span id="word-count-preview" class="text-sm text-gray-500">単語数: 0</span>
                <button id="start-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition transform active:scale-95">
                    計測開始
                </button>
            </div>
        </div>

        <!-- Step 2: Reading Section -->
        <div id="reading-section" class="hidden">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <span class="text-sm font-semibold text-blue-600">読書中...</span>
                <span id="timer-display" class="text-xl font-mono font-bold text-gray-700">00:00</span>
            </div>
            <div id="text-display" class="bg-gray-50 p-6 rounded-lg mb-6 max-h-96 overflow-y-auto text-gray-800">
                <!-- Text will be injected here -->
            </div>
            <button id="finish-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition transform active:scale-95">
                読み終わりました！
            </button>
        </div>

        <!-- Step 3: Result Section -->
        <div id="result-section" class="hidden text-center">
            <h2 class="text-xl font-bold text-gray-800 mb-4">結果発表</h2>
            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="bg-blue-50 p-4 rounded-lg">
                    <p class="text-xs text-blue-600 font-bold uppercase">単語数</p>
                    <p id="final-word-count" class="text-2xl font-bold text-gray-800">0</p>
                </div>
                <div class="bg-green-50 p-4 rounded-lg">
                    <p class="text-xs text-green-600 font-bold uppercase">経過時間</p>
                    <p id="final-time" class="text-2xl font-bold text-gray-800">0秒</p>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg border-2 border-purple-200">
                    <p class="text-xs text-purple-600 font-bold uppercase">WPM</p>
                    <p id="final-wpm" class="text-3xl font-bold text-purple-700">0</p>
                </div>
            </div>
            
            <div class="mb-6">
                <p id="wpm-comment" class="text-gray-600 italic"></p>
            </div>

            <button id="reset-btn" class="text-blue-600 hover:underline font-medium">
                もう一度計測する
            </button>
        </div>
    </div>

    <script>
        const setupSection = document.getElementById('setup-section');
        const readingSection = document.getElementById('reading-section');
        const resultSection = document.getElementById('result-section');
        const textInput = document.getElementById('text-input');
        const textDisplay = document.getElementById('text-display');
        const wordCountPreview = document.getElementById('word-count-preview');
        const timerDisplay = document.getElementById('timer-display');
        
        let startTime;
        let timerInterval;
        let wordCount = 0;

        // Count words in real-time
        textInput.addEventListener('input', () => {
            const text = textInput.value.trim();
            wordCount = text ? text.split(/\s+/).length : 0;
            wordCountPreview.textContent = `単語数: ${wordCount}`;
        });

        // Start measurement
        document.getElementById('start-btn').addEventListener('click', () => {
            const text = textInput.value.trim();
            if (!text) {
                alert('文章を入力してください。');
                return;
            }

            wordCount = text.split(/\s+/).length;
            textDisplay.textContent = text;
            
            setupSection.classList.add('hidden');
            readingSection.classList.remove('hidden');

            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 100);
        });

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const secs = (elapsed % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${mins}:${secs}`;
        }

        // Finish measurement
        document.getElementById('finish-btn').addEventListener('click', () => {
            clearInterval(timerInterval);
            const endTime = Date.now();
            const durationInSeconds = (endTime - startTime) / 1000;
            const durationInMinutes = durationInSeconds / 60;
            const wpm = Math.round(wordCount / durationInMinutes);

            readingSection.classList.add('hidden');
            resultSection.classList.remove('hidden');

            document.getElementById('final-word-count').textContent = wordCount;
            document.getElementById('final-time').textContent = `${Math.round(durationInSeconds)}秒`;
            document.getElementById('final-wpm').textContent = wpm;

            // Comment based on WPM
            let comment = "";
            if (wpm < 100) comment = "まずは正確に読むことから始めましょう！";
            else if (wpm < 150) comment = "平均的な読書スピードです。この調子！";
            else if (wpm < 200) comment = "素晴らしい！かなりスムーズに読めています。";
            else comment = "ネイティブ並みのスピードです！驚きです。";
            document.getElementById('wpm-comment').textContent = comment;
        });

        // Reset
        document.getElementById('reset-btn').addEventListener('click', () => {
            resultSection.classList.add('hidden');
            setupSection.classList.remove('hidden');
            timerDisplay.textContent = "00:00";
        });
    </script>
</body>
</html>
